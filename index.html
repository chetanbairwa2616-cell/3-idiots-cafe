<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3 Idiots Cafe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#3b2416;
color:white;
}

header{
background:#2a160d;
padding:20px;
text-align:center;
font-size:28px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.item{
background:#4a2e1f;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.4);
}

.item img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#e67e22;
border:none;
padding:8px 14px;
color:white;
border-radius:5px;
margin-top:8px;
cursor:pointer;
}

button:hover{
background:#ff9f43;
}

.cart{
background:#2a160d;
padding:20px;
margin:20px;
border-radius:10px;
}

.orders{
background:#1e120b;
padding:20px;
margin:20px;
border-radius:10px;
}

</style>

<script>

let cart={}

function addItem(name,price){

if(cart[name]){
cart[name].qty++
}else{
cart[name]={price:price,qty:1}
}

showCart()

}

function removeItem(name){

cart[name].qty--

if(cart[name].qty<=0){
delete cart[name]
}

showCart()

}

function showCart(){

let text=""
let total=0

for(let item in cart){

let qty=cart[item].qty
let price=cart[item].price

text+=item+" x"+qty+" ₹"+(price*qty)+" <button onclick=\"removeItem('"+item+"')\">-</button><br>"

total+=price*qty

}

document.getElementById("cartItems").innerHTML=text
document.getElementById("total").innerText=total

}

function placeOrder(){

let table=document.getElementById("table").value

let order="Table "+table+"<br>"

for(let item in cart){

order+=item+" x"+cart[item].qty+"<br>"

}

let div=document.createElement("div")

div.innerHTML=order+"<button onclick='this.parentElement.remove()'>Complete</button><hr>"

document.getElementById("ordersList").appendChild(div)

cart={}
showCart()

}

</script>

</head>

<body>

<header>

3 Idiots Cafe  
<p>Haldighati Gate Jaipur</p>

</header>

<div class="menu">

<div class="item">

<img src="https://images.unsplash.com/photo-1601924582975-7e3e2d5c9c89">

<h3>Pizza Small</h3>
<p>₹120</p>

<button onclick="addItem('Pizza Small',120)">Add</button>

</div>

<div class="item">

<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">

<h3>Veg Burger</h3>
<p>₹90</p>

<button onclick="addItem('Veg Burger',90)">Add</button>

</div>

<div class="item">

<img src="https://images.unsplash.com/photo-1627308595229-7830a5c91f9f">

<h3>Honey Chilli Potato</h3>
<p>₹130</p>

<button onclick="addItem('Honey Chilli Potato',130)">Add</button>

</div>

<div class="item">

<img src="https://images.unsplash.com/photo-1612929633738-8fe44f7ec841">

<h3>Hakka Noodles</h3>
<p>₹80</p>

<button onclick="addItem('Hakka Noodles',80)">Add</button>

</div>

<div class="item">

<img src="https://images.unsplash.com/photo-1572441713132-51c75654db73">

<h3>Cold Coffee Small</h3>
<p>₹60</p>

<button onclick="addItem('Cold Coffee Small',60)">Add</button>

</div>

<div class="item">

<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">

<h3>Cold Coffee Large</h3>
<p>₹110</p>

<button onclick="addItem('Cold Coffee Large',110)">Add</button>

</div>

</div>

<div class="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<br>

<select id="table">

<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Table 5</option>
<option>Table 6</option>

</select>

<br><br>

<button onclick="placeOrder()">Place Order</button>

</div>

<div class="orders">

<h2>Kitchen Orders</h2>

<div id="ordersList"></div>

</div>

</body>
</html>
